services:
  garmin-workouts-mcp-fork:
    image: garmin-workouts-mcp:fork-strength
    build:
      context: ../../
      dockerfile: deploy/synology/Dockerfile
    container_name: garmin-workouts-mcp-fork
    restart: unless-stopped
    env_file:
      - .env
    environment:
      GARTH_HOME: /garth
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8001"
      MCP_PATH: "/"
    volumes:
      - ./garth:/garth
    ports:
      - "8001:8001"
